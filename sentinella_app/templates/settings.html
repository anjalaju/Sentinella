<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Settings - Sentinella</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#a78bfa",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
    <div class="relative flex h-auto min-h-screen w-full flex-col overflow-x-hidden">
        <div class="layout-container flex h-full grow flex-col">
            <!-- Top Navigation Bar -->
            <header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-200 dark:border-slate-800 bg-background-light dark:bg-background-dark px-6 lg:px-10 py-3 sticky top-0 z-50">
                <div class="flex items-center gap-8">
                    <div class="flex items-center gap-3 text-primary">
                        <span class="material-symbols-outlined text-3xl">shield_person</span>
                        <h2 class="text-red-500 text-lg font-bold leading-tight tracking-[-0.015em]">Sentinella</h2>
                    </div>
                </div>
                <div class="flex flex-1 justify-end gap-6 items-center">
                    <nav class="hidden lg:flex items-center gap-8">
                        <a class="text-slate-600 dark:text-slate-400 text-sm font-medium hover:text-red-500 dark:hover:text-red-500 transition-colors" href="{% url 'dashboard' %}">Dashboard</a>
                        
                        <a class="text-slate-600 dark:text-slate-400 text-sm font-medium hover:text-red-500 dark:hover:text-red-500 transition-colors" href="{% url 'system_config' %}">System config</a>
                        <a class="text-primary text-sm font-semibold leading-normal" href="#">Settings</a>
                    </nav>
                    <div class="flex gap-2">
                        <a href="{% url 'notification' %}" class="flex items-center justify-center rounded-lg h-10 w-10 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 hover:text-primary transition-colors">
                            <span class="material-symbols-outlined text-xl">notifications</span>
                        </a>
                        <a href="{% url 'accounts' %}" class="flex items-center justify-center rounded-lg h-10 w-10 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 hover:text-primary transition-colors">
<span class="material-symbols-outlined text-xl">account_circle</span>
</a>                    </div>
                </div>
            </header>

            <div class="flex flex-1">
                <!-- Main Content -->
                <main class="flex-1 overflow-y-auto p-4 lg:p-8 max-w-4xl mx-auto w-full">
                    <!-- Settings Header -->
                    <div class="mb-8">
<h1 class="text-green-600 dark:text-green-400 text-3xl font-bold tracking-tight">Settings</h1>
<p class="text-green-500 mt-1">Manage your account preferences and system configurations.</p>
                    </div>

                    <!-- Settings Sections -->
                    <div class="space-y-8">
                        <!-- Profile Section -->
                        <section class="bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden">
                            <div class="p-6 border-b border-slate-200 dark:border-slate-700">
                                <h2 class="text-lg font-bold text-slate-900 dark:text-slate-100 flex items-center gap-2">
                                    <span class="material-symbols-outlined text-primary">person</span>
                                    Profile Settings
                                </h2>
                            </div>
                            <div class="p-6 space-y-6">
                                <div class="flex items-center gap-6">
                                    <div class="h-20 w-20 rounded-full bg-slate-200 dark:bg-slate-700 flex items-center justify-center border-2 border-primary/20 overflow-hidden">
                                        <img src="https://ui-avatars.com/api/?name=Anjal&background=a78bfa&color=fff&size=128" alt="Profile" class="h-full w-full object-cover"/>
                                    </div>
                                    <button class="px-4 py-2 border border-slate-200 dark:border-slate-700 rounded-lg text-sm font-medium hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors">
                                        Change Avatar
                                    </button>
                                </div>
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <label class="flex flex-col gap-2">
                                        <span class="text-sm font-medium text-slate-700 dark:text-slate-300">Name</span>
                                        <input type="text" value="Anjal" class="form-input rounded-lg border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 focus:ring-primary focus:border-primary text-slate-900 dark:text-slate-100" />
                                    </label>
                                    <label class="flex flex-col gap-2">
                                        <span class="text-sm font-medium text-slate-700 dark:text-slate-300">Role</span>
                                        <input type="text" value="Store Manager" disabled class="form-input rounded-lg border-slate-200 dark:border-slate-700 bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 cursor-not-allowed" />
                                    </label>
                                </div>
                            </div>
                            <div class="p-4 bg-slate-50 dark:bg-slate-900/50 border-t border-slate-200 dark:border-slate-700 flex justify-end">
                                <button class="px-6 py-2 bg-primary text-white rounded-lg text-sm font-bold shadow-sm hover:bg-blue-600 transition-colors">
                                    Save Changes
                                </button>
                            </div>
                        </section>

                        <!-- Notifications Section -->
                        <section class="bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden">
                            <div class="p-6 border-b border-slate-200 dark:border-slate-700">
                                <h2 class="text-lg font-bold text-slate-900 dark:text-slate-100 flex items-center gap-2">
                                    <span class="material-symbols-outlined text-primary">notifications</span>
                                    Notification Preferences
                                </h2>
                            </div>
                            <div class="p-6 space-y-4">
                                <label class="flex items-center justify-between p-4 border border-slate-200 dark:border-slate-700 rounded-lg cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-colors">
                                    <div class="flex flex-col">
                                        <span class="text-sm font-bold text-slate-900 dark:text-slate-100">Critical Alerts</span>
                                        <span class="text-xs text-slate-500">Immediate notifications for high-risk incidents</span>
                                    </div>
                                    <input type="checkbox" checked class="form-checkbox text-primary rounded focus:ring-primary h-5 w-5 bg-slate-100 dark:bg-slate-900 border-slate-300 dark:border-slate-600"/>
                                </label>
                                <label class="flex items-center justify-between p-4 border border-slate-200 dark:border-slate-700 rounded-lg cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-colors">
                                    <div class="flex flex-col">
                                        <span class="text-sm font-bold text-slate-900 dark:text-slate-100">Daily Summary</span>
                                        <span class="text-xs text-slate-500">Receive a daily digest of all store activities</span>
                                    </div>
                                    <input type="checkbox" checked class="form-checkbox text-primary rounded focus:ring-primary h-5 w-5 bg-slate-100 dark:bg-slate-900 border-slate-300 dark:border-slate-600"/>
                                </label>
                                <label class="flex items-center justify-between p-4 border border-slate-200 dark:border-slate-700 rounded-lg cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-colors">
                                    <div class="flex flex-col">
                                        <span class="text-sm font-bold text-slate-900 dark:text-slate-100">System Updates</span>
                                        <span class="text-xs text-slate-500">Notifications about Sentinella maintenance</span>
                                    </div>
                                    <input type="checkbox" class="form-checkbox text-primary rounded focus:ring-primary h-5 w-5 bg-slate-100 dark:bg-slate-900 border-slate-300 dark:border-slate-600"/>
                                </label>
                            </div>
                        </section>
                    </div>
                </main>
            </div>
        </div>
    </div>
</body>
</html>
