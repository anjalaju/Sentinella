<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Sentinella - Register</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#a78bfa",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                        "surface-dark": "#16222e",
                        "border-dark": "#233648",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased min-h-screen flex items-center justify-center p-6">

    <!-- Background Decoration -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
        <div class="absolute -top-[20%] -right-[10%] w-[70%] h-[70%] rounded-full bg-primary/5 blur-[120px]"></div>
        <div class="absolute -bottom-[20%] -left-[10%] w-[60%] h-[60%] rounded-full bg-blue-600/10 blur-[120px]"></div>
    </div>

    <!-- Register Container -->
    <div class="relative z-10 w-full max-w-md">
        <!-- Logo/Header -->
        <div class="text-center mb-10">
            <a href="{% url 'dashboard' %}" class="inline-flex items-center gap-2 mb-6 group">
                <div class="size-12 rounded-xl bg-surface-dark border border-border-dark flex items-center justify-center text-primary group-hover:border-primary/50 transition-colors shadow-lg">
                    <span class="material-symbols-outlined text-3xl">visibility</span>
                </div>
            </a>
            <h1 class="text-3xl font-bold text-white mb-2 tracking-tight">Create an Account</h1>
            <p class="text-slate-400">Join Sentinella to secure your environment</p>
        </div>

        <!-- Register Form Card -->
        <div class="bg-surface-dark border border-border-dark rounded-2xl p-8 shadow-2xl backdrop-blur-sm">
            <form action="#" method="POST" class="space-y-6">
                {% csrf_token %}
                <!-- Username Field -->
                <div>
                    <label for="username" class="block text-sm font-medium text-slate-300 mb-2">Username</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <span class="material-symbols-outlined text-slate-500 text-lg">person</span>
                        </div>
                        <input type="text" id="username" name="username" required autocomplete="off"
                            class="block w-full pl-10 pr-3 py-3 border border-border-dark rounded-xl bg-background-dark/50 text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
                            placeholder="Enter the username">
                    </div>
                </div>

                <!-- Email Field -->
                <div>
                    <label for="email" class="block text-sm font-medium text-slate-300 mb-2">Email Address</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <span class="material-symbols-outlined text-slate-500 text-lg">email</span>
                        </div>
                        <input type="email" id="email" name="email" required autocomplete="off"
                            class="block w-full pl-10 pr-3 py-3 border border-border-dark rounded-xl bg-background-dark/50 text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
                            placeholder="Enter the email address">
                    </div>
                </div>

                <!-- Password Field -->
                <div>
                    <label for="password" class="block text-sm font-medium text-slate-300 mb-2">Password</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <span class="material-symbols-outlined text-slate-500 text-lg">lock</span>
                        </div>
                        <input type="password" id="password" name="password" required autocomplete="new-password"
                            class="block w-full pl-10 pr-10 py-3 border border-border-dark rounded-xl bg-background-dark/50 text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
                            placeholder="Enter the password">
                        <button type="button" onclick="togglePasswordVisibility()" class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-500 hover:text-slate-300 transition-colors">
                            <span class="material-symbols-outlined text-lg" id="password-toggle-icon">visibility_off</span>
                        </button>
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="w-full flex justify-center items-center gap-2 py-3 px-4 border border-transparent rounded-xl shadow-sm text-sm font-bold text-white bg-purple-500 hover:bg-purple-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-purple-500 focus:ring-offset-background-dark transition-all transform hover:scale-[1.02]">
                    Create Account
                    <span class="material-symbols-outlined text-sm">person_add</span>
                </button>
            </form>

            <p class="mt-8 text-center text-sm text-slate-400">
                Already have an account?
                <a href="{% url 'login' %}" class="font-medium text-primary hover:text-blue-400 transition-colors">
                    Sign in
                </a>
            </p>
        </div>
    </div>
    <script>
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const icon = document.getElementById('password-toggle-icon');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.textContent = 'visibility';
            } else {
                passwordInput.type = 'password';
                icon.textContent = 'visibility_off';
            }
        }
    </script>
</body>
</html>
